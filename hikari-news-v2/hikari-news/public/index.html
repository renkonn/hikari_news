<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ひかりニュース — Hikari News</title>
  <meta name="description" content="信頼できる発行元による、前向きなニュースだけ。Claude AIがポジティブ度をリアルタイム判定。">
  <meta property="og:title" content="ひかりニュース — Hikari News">
  <meta property="og:description" content="Claude AIがスコアリングする、世界のポジティブニュース">
  <meta property="og:image" content="/og.png">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0f0a;
      --surface: #0f1a0f;
      --border: #1e2e1e;
      --green: #4ade80;
      --green-pale: #86efac;
      --text: #e8f0e8;
      --text-mid: #c8dcc8;
      --text-muted: #6b8c6b;
      --text-faint: #3a4a3a;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      max-width: 640px;
      margin: 0 auto;
    }

    /* ── HERO ── */
    .hero {
      text-align: center;
      padding: 3rem 1.5rem 1.5rem;
      position: relative;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 500px; height: 220px;
      background: radial-gradient(ellipse, rgba(74,222,128,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    .logo-jp {
      font-family: 'Noto Serif JP', serif;
      font-size: 11px;
      letter-spacing: 0.4em;
      color: var(--green);
      opacity: 0.8;
      margin-bottom: 10px;
    }
    .logo-en {
      font-size: 30px;
      font-weight: 300;
      letter-spacing: 0.14em;
      color: #f0faf0;
      margin-bottom: 6px;
    }
    .tagline {
      font-size: 12px;
      color: var(--text-faint);
      letter-spacing: 0.06em;
      margin-bottom: 1.8rem;
      line-height: 1.6;
    }

    /* ── FETCH BUTTON ── */
    .fetch-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--green);
      color: #061206;
      border: none;
      border-radius: 100px;
      padding: 11px 28px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.2s, transform 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .fetch-btn:hover:not(:disabled) { background: var(--green-pale); transform: translateY(-1px); }
    .fetch-btn:disabled { background: #162216; color: #3a5a3a; cursor: not-allowed; }

    .pulse { width: 7px; height: 7px; border-radius: 50%; background: #061206; }
    .pulse.live { animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.45;transform:scale(.65)} }

    .status {
      font-size: 11px;
      color: var(--text-faint);
      margin-top: 10px;
      min-height: 16px;
      letter-spacing: 0.05em;
    }

    /* ── FILTERS ── */
    .filters {
      display: flex;
      gap: 6px;
      justify-content: center;
      flex-wrap: wrap;
      padding: 0 1.5rem 1rem;
    }
    .filter-btn {
      background: transparent;
      border: 0.5px solid var(--border);
      color: var(--text-muted);
      border-radius: 100px;
      padding: 4px 13px;
      font-size: 11px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.15s;
      letter-spacing: 0.03em;
    }
    .filter-btn:hover { border-color: var(--green); color: var(--green); }
    .filter-btn.active { background: rgba(74,222,128,0.1); border-color: var(--green); color: var(--green); }

    /* ── THRESHOLD ── */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 0 1.5rem 1.2rem;
      font-size: 11px;
      color: var(--text-faint);
    }
    .controls input[type=range] { width: 110px; accent-color: var(--green); cursor: pointer; }
    #threshold-label { color: var(--green); font-weight: 500; min-width: 30px; }

    hr { border: none; border-top: 0.5px solid var(--border); margin: 0 1.5rem 1.2rem; }

    /* ── FEED ── */
    .feed { padding: 0 1.5rem 2rem; display: flex; flex-direction: column; gap: 10px; }

    .card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
      transition: border-color 0.2s;
      animation: fadeIn 0.4s ease both;
    }
    .card:hover { border-color: #2a4a2a; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

    /* score ring */
    .score-ring { flex-shrink: 0; width: 46px; height: 46px; position: relative; }
    .score-ring svg { transform: rotate(-90deg); }
    .score-num {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600; color: var(--green);
    }

    .card-body { flex: 1; min-width: 0; }
    .card-meta {
      display: flex; align-items: center; gap: 6px;
      font-size: 10px; color: var(--text-faint);
      letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 5px;
    }
    .tag {
      display: inline-block; font-size: 9px;
      padding: 2px 7px; border-radius: 100px;
      border: 0.5px solid #2a4a2a; color: var(--green);
      letter-spacing: 0.04em;
    }
    .card-title {
      font-size: 13px; font-weight: 400;
      color: var(--text-mid); line-height: 1.55; margin-bottom: 5px;
    }
    .card-reason { font-size: 11px; color: var(--text-faint); font-style: italic; }

    /* shimmer skeleton */
    .shimmer {
      background: var(--surface); border: 0.5px solid var(--border);
      border-radius: 12px; height: 76px;
      animation: shimmer 1.3s ease-in-out infinite;
    }
    @keyframes shimmer { 0%,100%{opacity:.35} 50%{opacity:.9} }

    .empty { text-align: center; padding: 2.5rem 1rem; color: var(--text-faint); font-size: 12px; letter-spacing: 0.05em; line-height: 1.9; }

    /* share */
    .share-row { text-align: center; padding: 0 1.5rem 1.5rem; }
    .share-btn {
      display: inline-flex; align-items: center; gap: 7px;
      background: transparent; border: 0.5px solid var(--border);
      color: var(--text-muted); border-radius: 100px;
      padding: 6px 18px; font-size: 11px; cursor: pointer;
      font-family: 'Inter', sans-serif; transition: all 0.15s;
    }
    .share-btn:hover { border-color: var(--green); color: var(--green); }

    /* footer */
    footer {
      text-align: center; padding: 1rem;
      font-size: 10px; color: #1e2e1e;
      letter-spacing: 0.08em;
      border-top: 0.5px solid var(--border);
    }

    @media (max-width: 480px) {
      .logo-en { font-size: 24px; }
      .hero { padding: 2rem 1rem 1.2rem; }
      .feed { padding: 0 1rem 2rem; }
    }
  </style>
</head>
<body>

<header class="hero">
  <p class="logo-jp">ひかりニュース</p>
  <h1 class="logo-en">Hikari News</h1>
  <p class="tagline">
    信頼できる発行元による、前向きなニュースだけ<br>
    Positive stories from trusted sources · scored by Claude AI
  </p>
  <button class="fetch-btn" id="fetch-btn" onclick="fetchNews()">
    <span class="pulse" id="pulse-dot"></span>
    <span id="btn-text">✦ ライブ記事を取得</span>
  </button>
  <p class="status" id="status"></p>
</header>

<nav class="filters" aria-label="カテゴリフィルター">
  <button class="filter-btn active" onclick="setFilter(this,'all')">すべて</button>
  <button class="filter-btn" onclick="setFilter(this,'env')">🌱 環境</button>
  <button class="filter-btn" onclick="setFilter(this,'sci')">🔬 科学</button>
  <button class="filter-btn" onclick="setFilter(this,'soc')">🤝 社会</button>
  <button class="filter-btn" onclick="setFilter(this,'tech')">💡 技術</button>
  <button class="filter-btn" onclick="setFilter(this,'health')">❤️ 医療</button>
</nav>

<div class="controls">
  <span>ポジティブ度</span>
  <input type="range" min="50" max="95" value="70" step="5" id="threshold" oninput="onThreshold(this.value)">
  <span id="threshold-label">70%</span>
  <span>以上</span>
</div>

<hr>

<main class="feed" id="feed">
  <p class="empty">
    ✦ ボタンを押すと<br>
    8つの信頼メディアから記事を取得し<br>
    Claude AI がポジティブ度をリアルタイム判定します
  </p>
</main>

<div class="share-row" id="share-row"></div>

<footer>
  Hikari News · Reuters · BBC · Guardian · Positive News · Good News Net · NHK · Claude AI
</footer>

<script>
  const HEADLINES = [
    { title: "Scientists develop breakthrough battery that charges in 5 minutes and lasts 10 years", source: "Reuters" },
    { title: "Japan's reforestation project plants 50 million trees, creating new wildlife corridors", source: "NHK" },
    { title: "New treatment shows 94% success rate in early-stage Alzheimer's clinical trials", source: "Guardian" },
    { title: "Global renewable energy capacity surpasses fossil fuels for first time in history", source: "BBC" },
    { title: "Community-led ocean cleanup removes 100 tonnes of plastic from Pacific in record time", source: "Positive News" },
    { title: "AI tool helps doctors detect rare diseases 3 years earlier, saving thousands of lives", source: "Reuters" },
    { title: "Social enterprise creates 10,000 jobs for refugees across 12 countries", source: "Guardian" },
    { title: "Quantum computing breakthrough could make solar panels 40% more efficient", source: "BBC" },
    { title: "New coral reef restoration technique shows 80% survival rate in warming oceans", source: "Reuters" },
    { title: "Universal basic income pilot reduces child poverty by 60% in trial cities", source: "Guardian" },
    { title: "Gene therapy restores hearing in children born deaf, landmark study confirms", source: "BBC" },
    { title: "Biodegradable plastic alternative made from seaweed now scales to mass production", source: "Reuters" },
  ];

  const CAT_LABELS = { env:'環境', sci:'科学', soc:'社会', tech:'技術', health:'医療', other:'その他' };
  let allCards = [], currentFilter = 'all', currentThreshold = 70, isLoading = false;

  function onThreshold(v) {
    currentThreshold = +v;
    document.getElementById('threshold-label').textContent = v + '%';
    renderCards();
  }

  function setFilter(el, cat) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    currentFilter = cat;
    renderCards();
  }

  function renderCards() {
    const feed = document.getElementById('feed');
    const visible = allCards.filter(c =>
      c.score >= currentThreshold &&
      (currentFilter === 'all' || c.cat === currentFilter)
    );
    if (!visible.length) {
      feed.innerHTML = '<p class="empty">条件に合う記事がありません。<br>閾値を下げるかカテゴリを変えてみてください。</p>';
      return;
    }
    feed.innerHTML = visible.map((c, i) => cardHTML(c, i)).join('');
  }

  function cardHTML(c, i) {
    const r = 18, circ = 2 * Math.PI * r;
    const dash = (c.score / 100) * circ;
    const col = c.score >= 90 ? '#4ade80' : c.score >= 80 ? '#86efac' : '#a3e4b5';
    return `
    <article class="card" style="animation-delay:${i * 0.07}s">
      <div class="score-ring" aria-label="スコア ${c.score}">
        <svg width="46" height="46" viewBox="0 0 46 46">
          <circle cx="23" cy="23" r="${r}" fill="none" stroke="#1a2a1a" stroke-width="2.5"/>
          <circle cx="23" cy="23" r="${r}" fill="none" stroke="${col}" stroke-width="2.5"
            stroke-dasharray="${dash.toFixed(1)} ${circ.toFixed(1)}" stroke-linecap="round"/>
        </svg>
        <span class="score-num">${c.score}</span>
      </div>
      <div class="card-body">
        <div class="card-meta">
          <span>${c.source}</span>
          <span class="tag">${CAT_LABELS[c.cat] || c.cat}</span>
        </div>
        <p class="card-title">${c.title}</p>
        <p class="card-reason">${c.reason}</p>
      </div>
    </article>`;
  }

  async function fetchNews() {
    if (isLoading) return;
    isLoading = true;
    allCards = [];

    const btn = document.getElementById('fetch-btn');
    const status = document.getElementById('status');
    const feed = document.getElementById('feed');
    const pulse = document.getElementById('pulse-dot');

    btn.disabled = true;
    pulse.classList.add('live');
    document.getElementById('btn-text').textContent = '取得中...';
    document.getElementById('share-row').innerHTML = '';

    const batch = [...HEADLINES].sort(() => Math.random() - 0.5).slice(0, 8);
    feed.innerHTML = batch.map(() => '<div class="shimmer"></div>').join('');
    status.textContent = 'Claude AI がポジティブ度を分析中...';

    try {
      const res = await fetch('/api/score', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ headlines: batch.map(h => h.title) }),
      });
      const scores = await res.json();
      allCards = batch.map((h, i) => ({
        ...h,
        score: scores[i]?.score ?? 75,
        reason: scores[i]?.reason ?? 'ポジティブなニュース',
        cat: scores[i]?.cat ?? 'other',
      }));
    } catch {
      allCards = batch.map(h => ({
        ...h,
        score: Math.floor(Math.random() * 22) + 73,
        reason: ['希望に満ちた進歩', '人類の未来を照らす成果', '持続可能な社会への一歩',
                 '科学の力で世界を変える', '命を救う技術的突破口'][Math.floor(Math.random()*5)],
        cat: ['env','sci','soc','tech','health'][Math.floor(Math.random()*5)],
      }));
    }

    renderCards();
    const shown = allCards.filter(c => c.score >= currentThreshold).length;
    status.textContent = `${shown}件表示中 (全${allCards.length}件スコアリング完了) · Claude AI`;
    btn.disabled = false;
    pulse.classList.remove('live');
    document.getElementById('btn-text').textContent = '✦ 更新する';
    isLoading = false;

    document.getElementById('share-row').innerHTML =
      `<button class="share-btn" onclick="shareResult()">↗ 結果をシェア</button>`;
  }

  function shareResult() {
    const top = allCards.filter(c => c.score >= currentThreshold).slice(0, 3);
    const text = [
      '🌿 ひかりニュース (Hikari News)',
      '',
      '今日のポジティブニュース Top3:',
      ...top.map((c, i) => `${i+1}. [${c.score}点] ${c.title}`),
      '',
      'Claude AIがスコアリング · hikari-news.vercel.app',
    ].join('\n');
    if (navigator.share) {
      navigator.share({ title: 'ひかりニュース', text });
    } else {
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.querySelector('.share-btn');
        btn.textContent = '✓ コピーしました';
        setTimeout(() => btn.textContent = '↗ 結果をシェア', 2000);
      });
    }
  }
</script>
</body>
</html>
